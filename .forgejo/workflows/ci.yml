# cfiber CI — runs on Forgejo Actions only.
#
# Lives in .forgejo/workflows/ (NOT .github/workflows/), so the GitHub push
# mirror carries the file but GitHub never executes it.
#
# Set the repo/org variable CI_IMAGE to the toolchain image, e.g.
# git.example.com/<owner>/cfiber-ci:latest (public package => no login needed).
name: ci

on:
  push:
    paths:
      - 'src/**'
      - 'include/**'
      - 'tests/**'
      - 'fuzz/**'
      - 'utils/**'
      - 'cmake/**'
      - '**/CMakeLists.txt'
      - '.forgejo/workflows/**'
  pull_request:

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  build-test:
    runs-on: docker
    container:
      image: "${{ vars.CI_IMAGE }}"
      credentials:
        username: "${{ github.repository_owner }}"
        password: "${{ secrets.REGISTRY_TOKEN }}"
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: x86_64-asan
            args: "-t -d --asan"
          - name: x86_64-ubsan
            args: "-t -d --ubsan"
          - name: x86_64-stack
            args: "-t -d --sanitizer"
          - name: aarch64
            args: "-t --arch=aarch64"
          - name: cortex-m0
            args: "-t --arch=arm --cpu=cortex-m0"
          - name: cortex-m3
            args: "-t --arch=arm --cpu=cortex-m3"
          - name: cortex-m4
            args: "-t --arch=arm --cpu=cortex-m4"
          - name: cortex-m7
            args: "-t --arch=arm --cpu=cortex-m7"
    name: "build-test (${{ matrix.name }})"
    steps:
      - uses: actions/checkout@v4
      - name: Build and run tests
        run: ./utils/make.sh ${{ matrix.args }}

  fuzz-smoke:
    runs-on: docker
    container:
      image: "${{ vars.CI_IMAGE }}"
      credentials:
        username: "${{ github.repository_owner }}"
        password: "${{ secrets.REGISTRY_TOKEN }}"
    steps:
      - uses: actions/checkout@v4
      - name: Build fuzzers
        run: |
          CC=clang cmake -G Ninja -B build-fuzz -DBUILD_TESTS=ON -DCFIBER_FUZZ=ON -DCMAKE_BUILD_TYPE=RelWithDebInfo
          cmake --build build-fuzz -j
      - name: Smoke-run fuzzers
        run: |
          ./build-fuzz/fuzz/fuzz_multislab -max_total_time=45 -print_final_stats=1
          ./build-fuzz/fuzz/fuzz_scheduler -max_total_time=45 -rss_limit_mb=4096 -print_final_stats=1
