# Builds and pushes the cfiber CI toolchain image.
#
# Kept OUT of the per-push test path: runs only on manual dispatch or a weekly
# schedule, so normal CI just pulls the cached image.
#
# Building an image needs Docker access. Run on a runner that can reach a Docker
# daemon (a `host`-labelled runner, or a `docker` runner with the socket mounted)
# and adjust `runs-on` to match.
#
# Required configuration:
#   vars.CI_IMAGE           e.g. git.example.com/<owner>/cfiber-ci:latest
#   vars.REGISTRY           e.g. git.example.com
#   secrets.REGISTRY_TOKEN  token/password with package write scope
name: ci-image

on:
  workflow_dispatch:
  schedule:
    - cron: '0 4 * * 1'  # Mondays 04:00 UTC

jobs:
  build-push:
    runs-on: host
    steps:
      - uses: actions/checkout@v4
      - name: Log in to registry
        run: |
          echo "${{ secrets.REGISTRY_TOKEN }}" |
            docker login "${{ vars.REGISTRY }}" -u "${{ github.actor }}" --password-stdin
      - name: Build and push
        run: |
          docker build -f ci/Containerfile -t "${{ vars.CI_IMAGE }}" ci/
          docker push "${{ vars.CI_IMAGE }}"
