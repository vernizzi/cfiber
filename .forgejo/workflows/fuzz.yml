# Time-boxed libFuzzer smoke run for the allocator and scheduler harnesses.
name: fuzz

on:
  push:
    paths:
      - 'src/**'
      - 'include/**'
      - 'fuzz/**'
      - 'cmake/**'
      - '**/CMakeLists.txt'
      - '.forgejo/workflows/**'
  pull_request:

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  fuzz-smoke:
    runs-on: docker
    container:
      image: "${{ vars.CI_IMAGE }}"
      credentials:
        username: "${{ github.repository_owner }}"
        password: "${{ secrets.REGISTRY_TOKEN }}"
    steps:
      - uses: actions/checkout@v4
      - name: Build fuzzers
        run: |
          CC=clang cmake -G Ninja -B build-fuzz -DBUILD_TESTS=ON -DCFIBER_FUZZ=ON -DCMAKE_BUILD_TYPE=RelWithDebInfo
          cmake --build build-fuzz -j
      - name: Smoke-run fuzzers
        run: |
          ./build-fuzz/fuzz/fuzz_multislab -max_total_time=45 -print_final_stats=1
          ./build-fuzz/fuzz/fuzz_scheduler -max_total_time=45 -rss_limit_mb=4096 -print_final_stats=1
